# GitHub Action tạo ảnh “snake” từ biểu đồ đóng góp
name: Generate Snake

# chạy tự động (ở đây là 6 giờ/lần) và cho phép chạy thủ công
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Bước 1: checkout code
      - uses: actions/checkout@v2

      # Bước 2: dùng action Platane/snk để tạo file snake
      - uses: Platane/snk@v3
        with:
          github_user_name: <tên_github_của_bạn>  # thay bằng username của bạn
          # những file sẽ được tạo (có thể đổi tên tuỳ ý)
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Bước 3: đẩy thay đổi lên nhánh output
      - name: Push changes
        uses: crazy-max/ghaction-github-pages@v2.1.3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
